<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMC 2026 - Dark Glassmorphism Hero</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        :root {
            /* Colores basados en la nueva ilustración */
            --glow-cyan: #35c4d6;
            --glow-orange: #f29c38;
            --bg-deep: #07090f; /* Fondo súper oscuro para resaltar la imagen */
            
            /* Dark Glassmorphism */
            --glass-bg: rgba(20, 25, 40, 0.4);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-blur: blur(24px);
            --glass-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
            
            --text-main: #ffffff;
            --text-muted: #a0aec0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            color: var(--text-main);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN MINIMALISTA --- */
        .navbar {
            position: absolute;
            top: 0;
            width: 100%;
            padding: 30px 5vw;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .nav-logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: 0.1em;
            color: var(--text-main);
            text-decoration: none;
        }
        
        .nav-logo span {
            color: var(--glow-cyan);
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--glow-orange);
        }

        /* --- LUCES AMBIENTALES DEL FONDO --- */
        .ambient-lights {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            overflow: hidden;
            z-index: -1;
            pointer-events: none;
        }

        .light-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.4;
            animation: drift 15s infinite alternate ease-in-out;
        }

        .orb-cyan {
            width: 50vw; height: 50vw;
            background: var(--glow-cyan);
            top: -10%; right: -10%;
        }

        .orb-orange {
            width: 40vw; height: 40vw;
            background: var(--glow-orange);
            bottom: -20%; left: -10%;
            animation-delay: -5s;
        }

        @keyframes drift {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(-5vw, 5vh) scale(1.2); }
        }

        /* --- HERO SECTION --- */
        .hero-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 100px 5vw 40px 5vw;
            position: relative;
        }

        .hero-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1300px;
            width: 100%;
            align-items: center;
        }

        /* Lado Izquierdo: Tarjeta Glassmorphism */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 60px 50px;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
        }

        /* Brillo sutil dentro de la tarjeta */
        .glass-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%);
            pointer-events: none;
        }

        .tagline {
            display: inline-block;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: var(--glow-orange);
            margin-bottom: 25px;
            border-left: 2px solid var(--glow-orange);
            padding-left: 15px;
        }

        .hero-title {
            font-size: clamp(2.5rem, 4vw, 3.8rem);
            font-weight: 800;
            line-height: 1.1;
            letter-spacing: -0.02em;
            margin-bottom: 25px;
        }

        .hero-title span {
            background: linear-gradient(90deg, var(--glow-cyan), var(--glow-orange));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-description {
            font-size: 1.15rem;
            line-height: 1.7;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 300;
        }

        .btn-glow {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 36px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glow-cyan);
            border-radius: 100px;
            color: #fff;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-decoration: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(53, 196, 214, 0.2);
        }

        .btn-glow:hover {
            background: var(--glow-cyan);
            color: var(--bg-deep);
            box-shadow: 0 0 30px rgba(53, 196, 214, 0.6);
            transform: translateY(-3px);
        }

        /* Lado Derecho: La Ilustración */
        .hero-illustration {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .hero-illustration img {
            width: 100%;
            max-width: 550px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.5));
            animation: floatImage 6s infinite ease-in-out;
        }

        /* Reflejo/Brillo detrás de la imagen */
        .illustration-glow {
            position: absolute;
            width: 300px;
            height: 400px;
            background: radial-gradient(circle, rgba(242,156,56,0.15) 0%, transparent 70%);
            z-index: -1;
            filter: blur(20px);
        }

        @keyframes floatImage {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-15px); }
            100% { transform: translateY(0px); }
        }

        /* --- RESPONSIVO MÓVIL --- */
        @media (max-width: 968px) {
            .navbar { padding: 20px 5vw; }
            .nav-links { display: none; }
            
            .hero-grid {
                grid-template-columns: 1fr;
                gap: 40px;
                text-align: center;
            }

            /* Cambiamos el orden para que la ilustración se vea primero en móvil */
            .hero-illustration {
                order: 1;
            }
            .glass-card {
                order: 2;
                padding: 40px 25px;
            }

            .tagline {
                border-left: none;
                border-bottom: 2px solid var(--glow-orange);
                padding-left: 0;
                padding-bottom: 5px;
            }

            .hero-title { font-size: 2.5rem; }
            .hero-illustration img { max-width: 80%; }
        }
    </style>
</head>
<body>

    <div class="ambient-lights">
        <div class="light-orb orb-cyan"></div>
        <div class="light-orb orb-orange"></div>
    </div>

    <nav class="navbar">
        <a href="#" class="nav-logo">CIMC<span>2026</span></a>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Programa</a></li>
            <li><a href="#">Sede</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <div class="hero-container">
        <div class="hero-grid">
            
            <div class="glass-card">
                <span class="tagline">CONGRESO INTERNACIONAL MÉDICO DE CAMPECHE 2026</span>
                <h1 class="hero-title">Retos de la Medicina en el <span>futuro cercano</span></h1>
                <p class="hero-description">
                    CIMC 2026 fusiona la herencia estructural de los centros históricos con la vanguardia del diseño sostenible y las tecnologías globales.
                </p>
                <a href="#" class="btn-glow">Inscríbete Hoy</a>
            </div>

            <div class="hero-illustration">
                <div class="illustration-glow"></div>
                <img src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1782525305/Ilustraci%C3%B3n_-_WEPM_wv3mfk.webp" alt="Ilustración CIMC 2026">
            </div>

        </div>
    </div>

</body>
</html>
