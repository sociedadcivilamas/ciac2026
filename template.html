<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMC 2026 | Experimental Glassmorphism</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Space+Grotesk:wght@500;700;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --brand-cyan: #00f0ff;
            --brand-magenta: #ff007b;
            --brand-purple: #7000ff;
            --bg-deep: #050507;
            
            /* Glassmorphism Ultra-Premium */
            --glass-bg: rgba(255, 255, 255, 0.02);
            --glass-border: rgba(255, 255, 255, 0.08);
            --glass-highlight: inset 0 1px 0 rgba(255, 255, 255, 0.2);
            --glass-blur: blur(40px);
            --glass-shadow: 0 30px 60px -10px rgba(0, 0, 0, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100%;
            background-color: var(--bg-deep);
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Congelado en el Hero para el impacto inicial */
            -webkit-font-smoothing: antialiased;
        }

        /* --- 1. FONDO DE RUIDO Y AURORA (EL SECRETO PREMIUM) --- */
        .noise-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.4;
            /* Textura de ruido SVG generada en CSS */
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .aurora-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: 1;
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(120px);
            opacity: 0.6;
            animation: breathe 15s infinite alternate cubic-bezier(0.4, 0, 0.2, 1);
        }

        .orb-1 {
            width: 50vw; height: 50vw;
            background: var(--brand-magenta);
            top: -20%; right: -10%;
        }

        .orb-2 {
            width: 60vw; height: 60vw;
            background: var(--brand-purple);
            bottom: -30%; left: -20%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 40vw; height: 40vw;
            background: var(--brand-cyan);
            top: 40%; left: 30%;
            opacity: 0.4;
            animation-delay: -10s;
            mix-blend-mode: screen;
        }

        @keyframes breathe {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.2) translate(-5vw, 5vh); }
        }

        /* --- 2. ELEMENTOS 3D FLOTANTES (PARA MOSTRAR EL BLUR) --- */
        .geometry {
            position: absolute;
            z-index: 2;
            background: linear-gradient(135deg, var(--brand-cyan), var(--brand-purple));
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            animation: floatShape 20s infinite linear;
        }

        .geo-sphere {
            width: 180px; height: 180px;
            border-radius: 50%;
            top: 15%; right: 25%;
            background: linear-gradient(135deg, var(--brand-magenta), #ff8a00);
        }

        .geo-pill {
            width: 120px; height: 300px;
            border-radius: 60px;
            bottom: -50px; left: 20%;
            transform: rotate(45deg);
        }

        @keyframes floatShape {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(180deg); }
            100% { transform: translateY(0) rotate(360deg); }
        }

        /* --- 3. NAVEGACIÓN MINIMALISTA --- */
        .nav-pill {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 15px 40px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 100px;
            z-index: 20;
            box-shadow: var(--glass-shadow);
        }

        .nav-pill a {
            color: #fff;
            text-decoration: none;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: color 0.3s ease;
        }

        .nav-pill a:hover { color: var(--brand-cyan); }
        
        .nav-brand {
            font-size: 1.2rem !important;
            color: var(--brand-cyan) !important;
        }

        /* --- 4. HERO SECTION EXPERIMENTAL --- */
        .hero-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .glass-hero-card {
            width: 90%;
            max-width: 1200px;
            padding: 80px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            border-radius: 32px;
            box-shadow: var(--glass-shadow), var(--glass-highlight);
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        /* Brillo de esquina sutil dentro del cristal */
        .glass-hero-card::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at top left, rgba(255,255,255,0.1) 0%, transparent 40%);
            pointer-events: none;
        }

        .hero-content { position: relative; z-index: 2; }

        .hero-badge {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            background: rgba(0, 240, 255, 0.1);
            border: 1px solid rgba(0, 240, 255, 0.3);
            border-radius: 100px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--brand-cyan);
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .hero-badge span {
            width: 6px; height: 6px;
            background: var(--brand-cyan);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--brand-cyan);
        }

        .hero-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: clamp(3.5rem, 6vw, 5.5rem);
            font-weight: 900;
            line-height: 0.95;
            letter-spacing: -0.04em;
            margin-bottom: 2rem;
        }

        .text-gradient {
            background: linear-gradient(to right, #fff, rgba(255,255,255,0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-desc {
            font-size: 1.1rem;
            font-weight: 300;
            line-height: 1.7;
            color: rgba(255,255,255,0.7);
            max-width: 450px;
            margin-bottom: 3rem;
        }

        /* Botón Experimental */
        .btn-exp {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 1.2rem 3rem;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.1em;
            color: #fff;
            text-transform: uppercase;
            text-decoration: none;
            background: transparent;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 100px;
            overflow: hidden;
            transition: all 0.4s ease;
        }

        .btn-exp::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, var(--brand-cyan), var(--brand-purple));
            z-index: -1;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .btn-exp:hover {
            border-color: transparent;
            box-shadow: 0 15px 30px rgba(112, 0, 255, 0.4);
            transform: translateY(-3px);
        }

        .btn-exp:hover::before { opacity: 1; }

        /* Elemento Abstracto Derecho */
        .hero-visual {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: flex-end;
        }

        .glass-ring {
            width: 300px; height: 300px;
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.1);
            position: absolute;
            right: 10%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .glass-ring::before {
            content: '';
            width: 260px; height: 260px;
            border-radius: 50%;
            border: 1px dashed rgba(255,255,255,0.2);
            animation: spin 30s linear infinite;
        }

        .data-point {
            position: absolute;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 15px 25px;
            border-radius: 12px;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--brand-cyan);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .dp-1 { top: 20%; right: -5%; }
        .dp-2 { bottom: 25%; right: 40%; color: var(--brand-magenta); }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* --- RESPONSIVO --- */
        @media (max-width: 968px) {
            body, html { overflow-y: auto; height: auto; }
            .nav-pill { display: none; }
            .glass-hero-card {
                grid-template-columns: 1fr;
                padding: 40px 25px;
                margin-top: 80px;
                margin-bottom: 40px;
            }
            .hero-title { font-size: 3rem; }
            .hero-visual { height: 250px; justify-content: center; margin-top: 20px; }
            .glass-ring { right: auto; width: 220px; height: 220px; }
            .glass-ring::before { width: 180px; height: 180px; }
            .dp-1 { right: 0; }
        }
    </style>
</head>
<body>

    <div class="noise-overlay"></div>

    <div class="aurora-container">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="geometry geo-sphere"></div>
    <div class="geometry geo-pill"></div>

    <nav class="nav-pill">
        <a href="#" class="nav-brand">CIMC</a>
        <a href="#">Inicio</a>
        <a href="#">Programa</a>
        <a href="#">Speakers</a>
        <a href="#">Registro</a>
    </nav>

    <div class="hero-wrapper">
        <div class="glass-hero-card">
            
            <div class="hero-content">
                <div class="hero-badge">
                    <span></span> EDICIÓN 2026
                </div>
                
                <h1 class="hero-title">
                    Medicina <br>
                    <span class="text-gradient">Redefinida.</span>
                </h1>
                
                <p class="hero-desc">
                    El epicentro donde la tecnología de vanguardia y la bioética convergen. Únete a los líderes globales de la salud en Campeche.
                </p>
                
                <a href="#" class="btn-exp">Inicia tu registro</a>
            </div>

            <div class="hero-visual">
                <div class="glass-ring">
                    <div class="data-point dp-1">BioTech // 37.4</div>
                    <div class="data-point dp-2">Genómica Aplicada</div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
