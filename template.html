<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMC 2026 - Hero Glassmorphism Ajustado</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #093c71;
            --bg-light-blue: #e8f1f8;
            --nav-text: #1da1f2;
            --glass-bg: rgba(255, 255, 255, 0.55);
            --glass-blur: blur(15px);
            --glass-border: rgba(255, 255, 255, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light-blue);
            color: var(--primary-blue);
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN --- */
        .navbar-wrapper {
            background-color: #ffffff;
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .navbar {
            max-width: 1200px;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            margin: 0 auto;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--nav-text);
            font-weight: 700;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }
        
        .nav-links a:hover {
            color: var(--primary-blue);
        }

        .lang-switch {
            display: flex;
            background: #9bc0e5;
            border-radius: 20px;
            overflow: hidden;
            padding: 2px;
        }

        .lang-switch a {
            text-decoration: none;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: 18px;
            color: #fff;
            transition: background 0.3s ease;
        }

        .lang-switch a.active {
            background-color: var(--primary-blue);
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: var(--primary-blue);
            cursor: pointer;
        }

        /* --- CONTENEDOR PRINCIPAL HERO --- */
        .main-container {
            padding: 25px 2vw;
            display: flex;
            justify-content: center;
        }

        .hero-card {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 85vh;
            min-height: 650px;
            border-radius: 40px;
            overflow: hidden;
            background-image: url('https://res.cloudinary.com/dh3cjks1a/image/upload/v1781295548/5f33f12c1fd4ac34e715c02c_cq9tlc.jpg');
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* --- CONTENIDO DEL HERO (Ajustado para Desktop) --- */
        .hero-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column; /* Apila elementos verticalmente */
            padding: 60px 6%; /* Aire arriba/abajo y a los lados */
        }

        /* Títulos Superior Izquierda */
        .hero-title-group {
            text-align: left;
            align-self: flex-start; /* Obliga a alinearse a la izquierda */
            color: #fff;
            text-shadow: 0 2px 15px rgba(0,0,0,0.4);
        }

        .hero-title-group h1 {
            font-size: clamp(3rem, 5vw, 5.5rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 5px;
            letter-spacing: -0.02em;
        }

        .hero-title-group h2 {
            font-size: clamp(1.4rem, 2.5vw, 2.2rem);
            font-weight: 700;
        }

        /* Tarjetas Inferior Derecha */
        .glass-cards-container {
            display: flex;
            gap: 20px;
            align-self: flex-end; /* Obliga a alinearse a la derecha */
            margin-top: auto; /* Empuja el contenedor hasta abajo */
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            padding: 35px 25px;
            width: 280px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 15px;
        }

        .glass-card h3 {
            font-size: 1.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            color: var(--primary-blue);
        }

        .glass-card p {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--primary-blue);
            margin-bottom: 25px;
        }

        .glass-btn {
            background: transparent;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 10px 22px;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .glass-btn:hover {
            background: var(--primary-blue);
            color: #fff;
        }

        /* --- RESPONSIVO MÓVIL --- */
        @media (max-width: 968px) {
            .navbar-wrapper {
                border-radius: 0;
            }

            .navbar {
                padding: 0 1rem;
            }

            .nav-links {
                display: none;
            }

            .menu-btn {
                display: block;
            }

            .lang-switch {
                margin-left: auto;
            }

            .main-container {
                padding: 0;
            }

            .hero-card {
                border-radius: 0;
                height: 100svh; 
                min-height: auto;
                /* AQUÍ CAMBIAS LA POSICIÓN DE LA IMAGEN EN MÓVIL */
                background-position: 35% center; 
            }

            .hero-content {
                padding: 80px 15px 30px 15px; 
                justify-content: center;
                align-items: center; /* Centra todo horizontalmente */
            }

            .hero-title-group {
                text-align: center;
                align-self: center; /* Sobrescribe la alineación izquierda de desktop */
                margin-bottom: 25px;
            }

            .hero-title-group h1 {
                font-size: 3rem; 
            }
            
            .hero-title-group h2 {
                font-size: 1.3rem;
            }

            .glass-cards-container {
                flex-direction: column;
                align-self: center; /* Sobrescribe la alineación derecha de desktop */
                margin-top: 0; /* Anula el margin-top: auto; */
                width: 100%;
                gap: 15px; 
                align-items: center;
            }

            .glass-card {
                width: 100%;
                max-width: 320px;
                padding: 20px 20px;
                height: auto;
            }

            .card-icon {
                font-size: 1.8rem;
                margin-bottom: 8px;
            }

            .glass-card h3 {
                font-size: 1.5rem; 
                margin-bottom: 5px;
            }

            .glass-card p {
                font-size: 0.85rem;
                margin-bottom: 15px;
            }
            
            .glass-btn {
                padding: 8px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <button class="menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="#">Greetings</a></li>
                <li><a href="#">Program</a></li>
                <li><a href="#">Information</a></li>
                <li><a href="#">Register</a></li>
                <li><a href="#">Hosts</a></li>
            </ul>
            <div class="lang-switch">
                <a href="#" class="active">EN</a>
                <a href="#">ES</a>
            </div>
        </nav>
    </div>

    <main class="main-container">
        <section class="hero-card">
            
            <div class="hero-content">
                
                <div class="hero-title-group">
                    <h1>CIMC 2026<br>CONGRESS</h1>
                    <h2>17–20 September</h2>
                </div>

                <div class="glass-cards-container">
                    
                    <div class="glass-card">
                        <div class="card-icon">🍷</div>
                        <h3>Opening</h3>
                        <p>Thursday, 17 September<br>15:00</p>
                        <a href="#" class="glass-btn">Navigate me there</a>
                    </div>

                    <div class="glass-card">
                        <div class="card-icon">🧭</div>
                        <h3>Venue</h3>
                        <p>Clarion Hotel® Helsinki</p>
                        <a href="#" class="glass-btn">Open website</a>
                    </div>

                </div>

            </div>

        </section>
    </main>

</body>
</html>
