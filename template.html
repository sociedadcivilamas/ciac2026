<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMC 2026 - Recreación Hero</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary-blue: #093c71; /* Azul de los textos y botones */
            --bg-light-blue: #e8f1f8; /* Fondo general fuera de la imagen */
            --nav-text: #1da1f2; /* Azul claro de los links del menú */
            --glass-bg: rgba(255, 255, 255, 0.65);
            --glass-blur: blur(12px);
            --glass-border: rgba(255, 255, 255, 0.9);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--bg-light-blue);
            color: var(--primary-blue);
            -webkit-font-smoothing: antialiased;
        }

        /* --- NAVEGACIÓN --- */
        .navbar-wrapper {
            background-color: #ffffff;
            width: 100%;
            display: flex;
            justify-content: center;
            position: relative;
            z-index: 100;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
        }

        .navbar {
            max-width: 1200px;
            width: 100%;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            list-style: none;
            margin: 0 auto; /* Centrar links en desktop */
        }

        .nav-links a {
            text-decoration: none;
            color: var(--nav-text);
            font-weight: 700;
            font-size: 0.9rem;
        }

        /* Pill de Idiomas */
        .lang-switch {
            display: flex;
            background: #9bc0e5;
            border-radius: 20px;
            overflow: hidden;
            padding: 2px;
        }

        .lang-switch a {
            text-decoration: none;
            padding: 6px 14px;
            font-size: 0.8rem;
            font-weight: 800;
            border-radius: 18px;
            color: #fff;
        }

        .lang-switch a.active {
            background-color: var(--primary-blue);
        }

        .menu-btn {
            display: none;
            background: none;
            border: none;
            font-size: 28px;
            color: var(--primary-blue);
            cursor: pointer;
        }

        /* --- CONTENEDOR PRINCIPAL HERO --- */
        .main-container {
            padding: 20px 2vw;
            display: flex;
            justify-content: center;
        }

        .hero-card {
            position: relative;
            width: 100%;
            max-width: 1400px;
            height: 80vh;
            min-height: 600px;
            border-radius: 40px;
            overflow: hidden;
            background-image: url('https://res.cloudinary.com/dh3cjks1a/image/upload/v1781295548/5f33f12c1fd4ac34e715c02c_cq9tlc.jpg');
            background-size: cover;
            background-position: center;
        }

        /* --- CONTENIDO DEL HERO --- */
        .hero-content {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            padding: 5% 8%;
        }

        .hero-title-group {
            align-self: flex-end;
            text-align: right;
            color: #fff;
            margin-bottom: auto;
            text-shadow: 0 2px 10px rgba(0,0,0,0.2);
        }

        .hero-title-group h1 {
            font-size: clamp(2.5rem, 5vw, 4.5rem);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 5px;
        }

        .hero-title-group h2 {
            font-size: clamp(1.2rem, 2vw, 1.8rem);
            font-weight: 700;
        }

        /* --- TARJETAS GLASSMORPHISM --- */
        .glass-cards-container {
            display: flex;
            gap: 25px;
            align-self: flex-end;
            margin-top: auto;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border: 2px solid var(--glass-border);
            border-radius: 30px;
            padding: 35px 25px;
            width: 280px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .card-icon {
            font-size: 2.5rem;
            margin-bottom: 15px;
        }

        .glass-card h3 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 15px;
            color: var(--primary-blue);
        }

        .glass-card p {
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.5;
            color: var(--primary-blue);
            margin-bottom: 25px;
        }

        .glass-btn {
            background: transparent;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-top: auto;
        }

        .glass-btn:hover {
            background: var(--primary-blue);
            color: #fff;
        }

        /* --- RESPONSIVO MÓVIL (Basado en la 2da captura) --- */
        @media (max-width: 968px) {
            .navbar-wrapper {
                border-radius: 0;
            }

            .navbar {
                padding: 0 1rem;
            }

            .nav-links {
                display: none; /* Ocultamos links en móvil */
            }

            .menu-btn {
                display: block; /* Mostramos hamburguesa */
            }

            .lang-switch {
                margin-left: auto;
            }

            .main-container {
                padding: 0; /* Imagen pegada a los bordes en móvil */
            }

            .hero-card {
                border-radius: 0;
                height: auto;
                min-height: 100vh;
                background-position: center top;
            }

            .hero-content {
                padding: 40px 20px;
                align-items: center;
            }

            .hero-title-group {
                align-self: center;
                text-align: center;
                margin-bottom: 40px;
            }

            .hero-title-group h1 {
                font-size: 3rem;
            }

            .glass-cards-container {
                flex-direction: column;
                align-self: center;
                width: 100%;
                max-width: 320px;
                gap: 20px;
            }

            .glass-card {
                width: 100%;
                padding: 40px 20px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar-wrapper">
        <nav class="navbar">
            <button class="menu-btn">☰</button>
            <ul class="nav-links">
                <li><a href="#">Greetings</a></li>
                <li><a href="#">Program</a></li>
                <li><a href="#">Information</a></li>
                <li><a href="#">Register</a></li>
                <li><a href="#">Hosts</a></li>
            </ul>
            <div class="lang-switch">
                <a href="#" class="active">EN</a>
                <a href="#">ES</a>
            </div>
        </nav>
    </div>

    <main class="main-container">
        <section class="hero-card">
            <div class="hero-content">
                
                <div class="hero-title-group">
                    <h1>CIMC 2026<br>CONGRESS</h1>
                    <h2>17–20 September</h2>
                </div>

                <div class="glass-cards-container">
                    
                    <div class="glass-card">
                        <div class="card-icon">🍷</div> <h3>Opening</h3>
                        <p>Thursday, 17 September<br>15:00</p>
                        <a href="#" class="glass-btn">Navigate me there</a>
                    </div>

                    <div class="glass-card">
                        <div class="card-icon">🧭</div> <h3>Venue</h3>
                        <p>Clarion Hotel® Helsinki</p>
                        <a href="#" class="glass-btn">Open website</a>
                    </div>

                </div>
            </div>
        </section>
    </main>

</body>
</html>
