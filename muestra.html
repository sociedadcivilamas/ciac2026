<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIAC 2026 — Gradient Semi-Flat Experience</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;700;800&display=swap" rel="stylesheet">

    <style>
        /* --- SISTEMA DE DISEÑO GRADIENT SEMI-FLAT --- */
        :root {
            --ciac-blue: #1e3a8a;
            --teal: #38bdf8;
            --gold: #facc15;
            --pink: #ec4899;
            --dark-surface: #0b132b;
            --font-main: 'Plus Jakarta Sans', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background-color: #f8fafc;
            color: var(--dark-surface);
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* --- BARRA DE NAVEGACIÓN --- */
        .navbar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 5vw;
            z-index: 100;
        }

        .navbar-logo {
            height: 48px;
            width: auto;
        }

        .nav-links {
            display: flex;
            gap: 3rem;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--dark-surface);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            position: relative;
            padding-bottom: 4px;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--teal), var(--pink));
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        /* --- OPENER DINÁMICO INFINITO (HERO) --- */
        .opener-hero {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 5vw;
            overflow: hidden;
            background: linear-gradient(-45deg, #f1f5f9, #e2e8f0, #e0f2fe, #fef9c3);
            background-size: 400% 400%;
            animation: fluidGradient 20s ease infinite;
        }

        /* Formas Geométricas Planas con Movimiento Orgánico */
        .geo-shape {
            position: absolute;
            mix-blend-mode: multiply;
            opacity: 0.6;
            animation: floatShape 25s infinite alternate ease-in-out;
        }

        .shape-1 {
            width: 40vw;
            height: 40vw;
            background: linear-gradient(135deg, var(--teal), var(--ciac-blue));
            border-radius: 50%;
            top: -10vw;
            right: 5vw;
        }

        .shape-2 {
            width: 35vw;
            height: 35vw;
            background: linear-gradient(135deg, var(--gold), var(--pink));
            border-radius: 80px; /* Cuadrado suavizado flat */
            bottom: -5vw;
            right: -5vw;
            animation-duration: 30s;
            animation-delay: -5s;
        }

        /* --- CONTENIDO HERO EDITORIAL --- */
        .hero-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            width: 100%;
            align-items: center;
            z-index: 10;
        }

        .hero-text-container {
            max-width: 750px;
        }

        .hero-tagline {
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            color: var(--ciac-blue);
            margin-bottom: 1.5rem;
            display: inline-block;
        }

        .hero-title {
            font-size: clamp(3rem, 6vw, 5.5rem);
            font-weight: 800;
            line-height: 1.05;
            color: var(--dark-surface);
            letter-spacing: -0.03em;
            margin-bottom: 2rem;
        }

        .hero-title span {
            background: linear-gradient(90deg, var(--ciac-blue), var(--pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero-description {
            font-size: clamp(1.1rem, 1.5vw, 1.3rem);
            line-height: 1.6;
            color: #475569;
            font-weight: 400;
            margin-bottom: 3rem;
            max-width: 600px;
        }

        /* Botón de Acción Sólido Premium */
        .btn-premium {
            display: inline-flex;
            align-items: center;
            padding: 1.2rem 2.5rem;
            background-color: var(--dark-surface);
            color: #fff;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            border-radius: 0; /* Estilo flat arquitectónico */
            box-shadow: 0 10px 30px rgba(11, 19, 43, 0.15);
            transition: all 0.3s ease;
        }

        .btn-premium:hover {
            background-color: var(--pink);
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(236, 72, 153, 0.3);
        }

        /* --- ABSTRACCIÓN GRÁFICA CINÉTICA (PLANO MODERNO) --- */
        .canvas-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
        }

        /* Arco interactivo que simula la puerta colonial combinada con tecnología */
        .abstract-architecture {
            width: 300px;
            height: 400px;
            border: 4px solid var(--dark-surface);
            border-radius: 150px 150px 0 0; /* Arco perfecto flat */
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulseStructure 6s infinite alternate ease-in-out;
        }

        .abstract-architecture::before {
            content: '';
            position: absolute;
            width: 180px;
            height: 180px;
            border: 4px dashed var(--pink);
            border-radius: 50%;
            animation: rotateData 15s linear infinite;
        }

        .abstract-architecture::after {
            content: '';
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 4px;
            background-color: var(--gold);
        }

        /* --- ANIMACIONES DE ALTA FLUIDEZ (60FPS) --- */
        @keyframes fluidGradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        @keyframes floatShape {
            0% { transform: translate(0, 0) rotate(0deg) scale(1); }
            50% { transform: translate(3vw, -2vh) rotate(90deg) scale(1.05); }
            100% { transform: translate(-2vw, 3vh) rotate(180deg) scale(0.95); }
        }

        @keyframes rotateData {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        @keyframes pulseStructure {
            0% { transform: scale(1) translateY(0); }
            100% { transform: scale(1.03) translateY(-10px); }
        }

        /* --- DISEÑO RESPONSIVO MÓVIL --- */
        @media (max-width: 968px) {
            .navbar { height: 80px; padding: 0 6vw; }
            .nav-links { display: none; }
            .hero-grid { grid-template-columns: 1fr; text-align: center; margin-top: 60px; }
            .hero-text-container { max-width: 100%; }
            .hero-description { margin: 0 auto 3rem auto; }
            .canvas-container { display: none; } /* Ocultamos abstracción en móvil para cuidar el aire */
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">
            <img src="https://i.ibb.co/3WkXh4f/CIAC-Logo.png" alt="CIAC 2026" class="navbar-logo">
        </a>
        <ul class="nav-links">
            <li><a href="#">Inicio</a></li>
            <li><a href="#">Ejes</a></li>
            <li><a href="#">Sede</a></li>
            <li><a href="#">Contacto</a></li>
        </ul>
    </nav>

    <section class="opener-hero">
        
        <div class="geo-shape shape-1"></div>
        <div class="geo-shape shape-2"></div>

        <div class="container hero-grid">
            
            <div class="hero-text-container">
                <span class="hero-tagline">Foro Internacional de Arquitectura</span>
                <h1 class="hero-title">El Futuro de las<br>Ciudades <span>Coloniales</span></h1>
                <p class="hero-description">CIAC 2026 fusiona la herencia estructural de los centros históricos con la vanguardia del diseño sostenible y las tecnologías globales.</p>
                <a href="#" class="btn-premium">Explorar Foro</a>
            </div>

            <div class="canvas-container">
                <div class="abstract-architecture">
                    </div>
            </div>

        </div>

    </section>

</body>
</html>
