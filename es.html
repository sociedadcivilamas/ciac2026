<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FUEN 2026 - Header</title>
    <style>
        /* Paleta de Colores Personalizada */
        :root {
            --c-brown: #613227;
            --c-dark-blue: #115D8C;
            --c-cyan: #1FBFAF;
            --c-green: #17A655;
            --c-orange: #F2921D;
            --bg-light: #e8f4f8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            /* Fondo con un gradado sutil para que resalte el logo */
            background: linear-gradient(135g, #fdfdfd 0%, var(--bg-light) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Navegación --- */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
            position: relative;
            z-inx: 10;
        }

        .nav-links {
            display: flex;
            gap: 2.5rem;
            font-weight: 700;
            color: var(--c-dark-blue);
        }

        .nav-links a {
            text-coration: none;
            color: inherit;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--c-cyan);
        }

        .lang-switch {
            display: flex;
            background-color: var(--c-cyan);
            borr-radius: 20px;
            overflow: hidn;
        }

        .lang-switch span {
            padding: 0.5rem 1rem;
            font-size: 0.85rem;
            font-weight: bold;
            cursor: pointer;
            color: white;
            transition: background 0.3s ease;
        }

        .lang-switch .active {
            background-color: var(--c-dark-blue);
        }

        /* --- Sección Hero --- */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 5%;
            position: relative;
        }

        .hero-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4rem;
            flex-wrap: wrap;
            width: 100%;
            max-width: 1200px;
        }

        .hero-logo {
            width: 100%;
            max-width: 320px;
            height: auto;
            object-fit: contain;
        }

        .hero-text {
            text-align: left;
            display: flex;
            flex-direction: column;
        }

        .location-top {
            align-self: flex-end;
            color: var(--c-dark-blue);
            font-weight: 700;
            font-size: 1.4rem;
        }

        .hero-text h1 {
            font-size: 5rem;
            color: var(--c-dark-blue);
            line-height: 1;
            font-weight: 900;
            letter-spacing: -1px;
        }

        .hero-text h1 span {
            color: var(--c-orange);
        }

        .hero-text h2 {
            font-size: 3.5rem;
            color: var(--c-dark-blue);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .location-bottom {
            align-self: flex-end;
            font-size: 2.2rem;
            color: var(--c-orange);
            font-weight: 700;
            position: relative;
            margin-top: -3.5rem;
            margin-bottom: 2.5rem;
        }

        /* Subrayado estilo "marcador" */
        .location-bottom::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: -10px;
            right: -10px;
            height: 6px;
            background-color: var(--c-orange);
            border-radius: 10px;
            opacity: 0.7;
        }

        .date {
            text-align: center;
            font-size: 2rem;
            color: var(--c-cyan);
            font-weight: 700;
            margin-top: 1rem;
        }

        .scroll-down {
            position: absolute;
            bottom: 2rem;
            width: 45px;
            height: 45px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--c-dark-blue);
            box-shadow: 0 4px 10px rgba(17, 93, 140, 0.15);
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
        }

        /* --- Responsividad para móviles --- */
        @media (max-width: 900px) {
            .hero-content {
                gap: 2rem;
                text-align: center;
            }
            .hero-text {
                align-items: center;
            }
            .location-top, .location-bottom {
                align-self: center;
                margin-top: 0;
            }
            .location-bottom {
                margin-bottom: 1rem;
            }
        }

        @media (max-width: 768px) {
            .nav-links { display: none; } /* Oculta enlaces en móvil para simplificar */
            .hero-text h1 { font-size: 3.5rem; }
            .hero-text h2 { font-size: 2.5rem; }
            .date { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="nav-links">
            <a href="#greetings">Greetings</a>
            <a href="#program">Program</a>
            <a href="#info">Information</a>
            <a href="#register">Register</a>
            <a href="#hosts">Hosts</a>
        </div>
        <div class="lang-switch">
            <span class="active">ES</span>
            <span>EN</span>
        </div>
    </nav>

    <header class="hero">
        <div class="hero-content">
            
            <img src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1782424559/Gemini_Generated_Image_dno94wdno94wdno9_suuren.webp" alt="FUEN 2026 Logo" class="hero-logo">
            
            <div class="hero-text">
                <div class="location-top">Helsinki</div>
                <h1>FUEN <span>2026</span></h1>
                <div class="location-bottom">Helsingfors</div>
                <h2>CONGRESS</h2>
                <div class="date">17–20 September</div>
            </div>

        </div>
        
        <div class="scroll-down">↓</div>
    </header>

</body>
</html>
