<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIAC 2026 - Congreso Médico Campeche</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    
    <style>
        /* =========================================
           1. RESET Y VARIABLES
           ========================================= */
        :root {
            --primary-blue: #1e3a8a;    /* Azul profundo del logo CIAC */
            --teal: #2dd4bf;            /* Color agua del logo */
            --orange: #fb923c;          /* Naranja cálido */
            --bg-gradient: linear-gradient(180deg, #e0f2fe 0%, #ffffff 50%); /* Degradado suave tipo FUEN */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        body {
            background: var(--bg-gradient);
            color: var(--primary-blue);
            overflow-x: hidden;
        }

        /* =========================================
           2. NAVEGACIÓN (HEADER)
           ========================================= */
        .navbar {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 50px;
            gap: 40px;
            font-weight: 600;
            font-size: 15px;
            color: var(--primary-blue);
        }

        .navbar a {
            text-decoration: none;
            color: inherit;
            transition: color 0.3s;
        }

        .navbar a:hover {
            color: var(--teal);
        }

        /* Switch de Idioma (ES / EN) */
        .lang-switch {
            display: flex;
            background: #93c5fd; /* Azul clarito */
            border-radius: 30px;
            padding: 4px;
            margin-left: auto; /* Empuja el switch a la derecha */
        }

        .lang-switch span {
            padding: 6px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 800;
        }

        .lang-switch .active {
            background: var(--primary-blue);
            color: white;
        }

        .lang-switch .inactive {
            color: white;
        }

        /* =========================================
           3. HERO SECTION (Logo Centrado)
           ========================================= */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 60px 20px 100px;
        }

        .hero-logo {
            max-width: 450px;
            margin-bottom: 20px;
            /* Aquí usamos el logo oficial que me enviaste */
        }

        .hero-dates {
            font-size: 24px;
            font-weight: 800;
            color: #60a5fa; /* Azul claro para el texto secundario */
            margin-top: 15px;
        }

        /* =========================================
           4. SECCIÓN DE SEDE CON EFECTO CRISTAL (GLASSMORPHISM)
           ========================================= */
        .venue-section {
            position: relative;
            width: 90%;
            max-width: 1300px;
            height: 600px;
            margin: 0 auto 100px;
            border-radius: 40px; /* Esquinas muy redondeadas tipo FUEN */
            overflow: hidden;
            
            /* Aquí usamos tu ilustración de Campeche de fondo */
            background-image: url('https://res.cloudinary.com/dh3cjks1a/image/upload/v1782420382/Gemini_Generated_Image_kz649qkz649qkz64_2_r4q3z2.png');
            background-size: cover;
            background-position: center;
            
            display: flex;
            justify-content: flex-end;
            align-items: flex-end;
            padding: 40px;
            gap: 20px;
        }

        /* Título sobre la imagen */
        .venue-title {
            position: absolute;
            top: 40px;
            right: 50px;
            color: white;
            text-align: right;
            text-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .venue-title h2 { font-size: 50px; font-weight: 800; line-height: 1; }
        .venue-title p { font-size: 22px; font-weight: 600; }

        /* Tarjetas de Cristal (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.7); /* Blanco semi-transparente */
            backdrop-filter: blur(15px); /* Efecto borroso de cristal */
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            padding: 40px 30px;
            width: 280px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        .glass-card h3 {
            font-size: 30px;
            font-weight: 800;
            color: var(--primary-blue);
            margin: 15px 0 10px;
        }

        .glass-card p {
            font-size: 14px;
            color: #475569;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .glass-btn {
            background: transparent;
            border: 1px solid var(--primary-blue);
            color: var(--primary-blue);
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .glass-btn:hover {
            background: var(--primary-blue);
            color: white;
        }

        /* =========================================
           5. BANNER CTA (FOOTER)
           ========================================= */
        .cta-banner {
            background: var(--primary-blue);
            width: 90%;
            max-width: 1300px;
            margin: 0 auto 60px;
            border-radius: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 40px 60px;
            color: white;
        }

        .cta-left {
            display: flex;
            align-items: center;
            gap: 30px;
        }

        /* Usamos el logo en miniatura para el banner */
        .cta-logo {
            height: 80px;
            background: white;
            padding: 10px;
            border-radius: 15px;
        }

        .cta-text h2 {
            font-size: 32px;
            font-weight: 800;
        }

        .cta-text p {
            color: #93c5fd;
            font-size: 18px;
            font-weight: 600;
        }

        .cta-btn-main {
            background: transparent;
            border: 2px solid white;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cta-btn-main:hover {
            background: white;
            color: var(--primary-blue);
        }

    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#">Inicio</a>
        <a href="#">Programa</a>
        <a href="#">Información</a>
        <a href="#">Registro</a>
        <a href="#">Ponentes</a>
        
        <div class="lang-switch">
            <span class="active">ES</span>
            <span class="inactive">EN</span>
        </div>
    </nav>

    <section class="hero">
        <img src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1782420382/Gemini_Generated_Image_dno94wdno94wdno9_1_foddmj.webp" alt="CIAC 2026 Logo" class="hero-logo">
        <div class="hero-dates">15–18 Octubre</div>
    </section>

    <section class="venue-section">
        
        <div class="venue-title">
            <h2>Campeche</h2>
            <p>CONGRESO MÉDICO</p>
        </div>

        <div class="glass-card">
            <div style="font-size: 40px;">🥂</div>
            <h3>Apertura</h3>
            <p>Jueves, 15 Octubre<br>19:00 hrs<br>Fuerte de San Miguel</p>
            <button class="glass-btn">Ver Programa</button>
        </div>

        <div class="glass-card">
            <div style="font-size: 40px;">🏛️</div>
            <h3>Sede</h3>
            <p>Centro Internacional de Convenciones Campeche XXI</p>
            <button class="glass-btn">Abrir Mapa</button>
        </div>

    </section>

    <section class="cta-banner">
        <div class="cta-left">
            <img src="https://res.cloudinary.com/dh3cjks1a/image/upload/v1782420382/Gemini_Generated_Image_dno94wdno94wdno9_1_foddmj.webp" alt="CIAC Icon" class="cta-logo">
            <div class="cta-text">
                <h2>CIAC 2026</h2>
                <p>15–18 Octubre • Campeche</p>
            </div>
        </div>
        <button class="cta-btn-main">Regístrate ahora</button>
    </section>

</body>
</html>
